name: terraform

# Validates the PulseMonitor infrastructure on every change.
# Scaffolding sprint: format, validate, and test only — no init against a real
# backend, no plan/apply, no AWS credentials required.

on:
  push:
    branches: [main]
    paths: ["infrastructure/**", ".github/workflows/terraform.yml"]
  pull_request:
    paths: ["infrastructure/**", ".github/workflows/terraform.yml"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Format check
        run: terraform fmt -recursive -check

      - name: Module scaffolding check
        run: bash tests/structure.sh

      - name: Validate and test root module
        run: |
          terraform init -backend=false -input=false
          terraform validate
          terraform test

      - name: Validate and test bootstrap
        working-directory: infrastructure/bootstrap
        run: |
          terraform init -backend=false -input=false
          terraform validate
          terraform test
